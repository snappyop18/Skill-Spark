<!DOCTYPE html>
<html>
<head>
<title>Register - SkillSpark</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container my-5">
  <h2>Registration Form</h2>
  <form>
    <div class="row">
      <div class="col-md-6 mb-3">
        <input type="text" class="form-control" placeholder="Full Name">
      </div>
      <div class="col-md-6 mb-3">
        <input type="email" class="form-control is-valid" placeholder="Email">
      </div>
    </div>

    <select class="form-control mb-3">
      <option>Select Course</option>
      <option>Web Development</option>
    </select>

    <div class="form-check">
      <input class="form-check-input" type="radio" name="gender">
      <label class="form-check-label">Male</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox">
      <label class="form-check-label">Agree to terms</label>
    </div>

    <input type="file" class="form-control my-3">

    <button type="button" onclick="alert('Registration Successful!')" class="btn btn-primary">
      Submit
    </button>

  </form>
</div>

</body>
</html>
