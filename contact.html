<!DOCTYPE html>
<html>
<head>
<title>Contact - SkillSpark</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container my-5">
  <h2>Contact Us</h2>

  <form>
    <input type="text" class="form-control mb-3" placeholder="Your Name">
    <input type="email" class="form-control mb-3" placeholder="Your Email">
    <textarea class="form-control mb-3" placeholder="Message"></textarea>
    <button type="button" onclick="alert('Message Sent!')" class="btn btn-success">
      Send
    </button>
  </form>

  <div class="mt-5">
    <iframe width="100%" height="300"
    src="https://maps.google.com/maps?q=lahore&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>
  </div>
</div>

</body>
</html>
