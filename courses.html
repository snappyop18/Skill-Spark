<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSpark - Courses</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container my-5">
  <h2 class="text-center mb-4">Our Courses</h2>
  <div class="row">
    
    <!-- Course Card -->
    <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
      <div class="card shadow">
        <img src="assets/images/1.jpg" class="card-img-top">
        <div class="card-body">
          <span class="badge bg-success">$99</span>
          <h5>Web Development</h5>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#courseModal">Enroll Now</button>
        </div>
      </div>
    </div>

    <!-- Duplicate 5 more cards -->
    
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="courseModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Course Details</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Detailed information about the course.
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
